name: Python

# Scope: gates for the grounded-graph Python package.
#
# Security review:
#   Only trusted inputs (paths and branches from `on:` config) are referenced.
#   No untrusted user-supplied fields are interpolated into run: blocks.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv + install dev dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Check Python terminology (LLM / AI assistant / production-ready)
        run: |
          set -e
          if grep -riE "\bLLM\b|\bAI assistant\b|production-ready" \
              src tests README.md MANUAL.md API.md CHANGELOG.md 2>/dev/null; then
            echo "FAIL: forbidden terminology in Python sources or public docs"
            exit 1
          fi
          echo "Terminology clean"

      - name: Check bare except outside tests
        run: |
          set -e
          if grep -rEn '^\s*except\s*:' src 2>/dev/null; then
            echo "FAIL: bare 'except:' in library code"
            exit 1
          fi
          echo "No bare except clauses"

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy

      - name: pytest
        run: pytest -q
